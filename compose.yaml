services:
  postgres:
    image: postgres:16.9-alpine
    environment:
      POSTGRES_DB: loresafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loresafe"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    stop_grace_period: 10s

volumes:
  postgres_data:
