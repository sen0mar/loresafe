name: Release gate

on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1" # Mondays at 03:17 UTC
  workflow_dispatch:

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "${archive}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check
          tar -xzf "${archive}" -C "${RUNNER_TEMP}" gitleaks
          "${RUNNER_TEMP}/gitleaks" version

      - name: Scan all committed history
        run: |
          echo "Scanning all Git history reachable from every ref (--all)."
          "${RUNNER_TEMP}/gitleaks" git \
            --config=.gitleaks.toml \
            --log-opts='--all' \
            --redact \
            --verbose \
            --report-format=sarif \
            --report-path=gitleaks.sarif \
            .

      - name: Upload Gitleaks SARIF report
        if: ${{ always() && hashFiles('gitleaks.sarif') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        env:
          GITLEAKS_VERSION: 8.30.1
        with:
          name: gitleaks-sarif-v${{ env.GITLEAKS_VERSION }}-attempt-${{ github.run_attempt }}
          path: gitleaks.sarif
          if-no-files-found: error
          retention-days: 10

  static-quality:
    name: Static quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://unused:unused@localhost:5432/unused
      DIRECT_URL: postgresql://unused:unused@localhost:5432/unused
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level low

      - name: Lint source and enforce import boundaries
        run: pnpm lint

      - name: Check repository formatting
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate versioned API contract
        run: pnpm api:contract:check

      - name: Validate production readiness controls
        run: pnpm production:readiness:check

  unit-and-coverage:
    name: Unit and coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://unused:unused@127.0.0.1:5432/unused
      DIRECT_URL: postgresql://unused:unused@127.0.0.1:5432/unused
      JWT_SECRET: ci-only-jwt-secret-ci-only-jwt-secret
      NODE_ENV: test
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce risk-based API and web coverage
        run: pnpm test:coverage:ci

      - name: Upload coverage reports
        if: ${{ always() && hashFiles('apps/api/coverage/**', 'apps/web/coverage/**') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-reports-${{ github.run_id }}-${{ github.job }}-attempt-${{ github.run_attempt }}
          path: |
            apps/api/coverage
            apps/web/coverage
          if-no-files-found: error
          retention-days: 10

  database-integration:
    name: Database integration
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16.9-alpine
        env:
          POSTGRES_DB: loresafe_database_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d loresafe_database_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loresafe_database_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/loresafe_database_ci
      JWT_SECRET: ci-only-jwt-secret-ci-only-jwt-secret
      NODE_ENV: test
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply committed migrations
        run: pnpm --filter @loresafe/api prisma:migrate:deploy

      - name: Validate migration state and generated client
        run: pnpm db:check

      - name: Run PostgreSQL security and concurrency tests
        run: pnpm test:integration:database:ci

  build:
    name: Production build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://unused:unused@localhost:5432/unused
      DIRECT_URL: postgresql://unused:unused@localhost:5432/unused
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production API and web artifacts
        run: pnpm build

      - name: Upload browser runtime artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: browser-runtime-${{ github.run_id }}-${{ github.job }}-attempt-${{ github.run_attempt }}
          path: |
            apps/api/dist
            apps/web/dist
          if-no-files-found: error
          retention-days: 10

  browser-accessibility:
    name: Browser and accessibility
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16.9-alpine
        env:
          POSTGRES_DB: loresafe_browser_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d loresafe_browser_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_NAME: LoreSafe CI
      CLIENT_ORIGIN: http://127.0.0.1:4173
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loresafe_browser_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/loresafe_browser_ci
      JWT_SECRET: ci-only-jwt-secret-ci-only-jwt-secret
      NODE_ENV: test
      SESSION_COOKIE_SECURE: "false"
      TRUST_PROXY_CIDRS: loopback
      DEMO_SEED_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loresafe_browser_ci
      DEMO_SEED_CONFIRM: I_UNDERSTAND_THIS_WRITES_DEMO_DATA
      DEMO_USER_EMAIL: browser-demo@example.com
      DEMO_USER_DISPLAY_NAME: Browser Demo Reader
      DEMO_USER_PASSWORD: browser-demo-password
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Download production runtime artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: browser-runtime-${{ github.run_id }}-build-attempt-${{ github.run_attempt }}
          path: apps

      - name: Generate Prisma client for browser data setup
        run: pnpm --filter @loresafe/api prisma:generate

      - name: Apply committed migrations
        run: pnpm --filter @loresafe/api prisma:migrate:deploy

      - name: Seed isolated browser-test data
        run: pnpm --filter @loresafe/api prisma:seed

      - name: Install Chromium for browser gates
        run: pnpm exec playwright install --with-deps chromium

      - name: Run production browser and accessibility gates
        run: pnpm test:browser

      - name: Upload Playwright HTML report
        if: ${{ (failure() || cancelled()) && hashFiles('playwright-report/**') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.job }}-attempt-${{ github.run_attempt }}
          path: playwright-report
          if-no-files-found: error
          retention-days: 10

      - name: Upload Playwright test results
        if: ${{ (failure() || cancelled()) && hashFiles('test-results/**') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results-${{ github.run_id }}-${{ github.job }}-attempt-${{ github.run_attempt }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 10

  release-gate:
    name: Release gate
    if: ${{ always() }}
    needs:
      - secret-scan
      - static-quality
      - unit-and-coverage
      - database-integration
      - build
      - browser-accessibility
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Confirm every safety-critical job succeeded
        if: ${{ needs.secret-scan.result == 'success' && needs.static-quality.result == 'success' && needs.unit-and-coverage.result == 'success' && needs.database-integration.result == 'success' && needs.build.result == 'success' && needs.browser-accessibility.result == 'success' }}
        run: echo "Every safety-critical release job succeeded."

      - name: Fail closed when any safety-critical job did not succeed
        if: ${{ needs.secret-scan.result != 'success' || needs.static-quality.result != 'success' || needs.unit-and-coverage.result != 'success' || needs.database-integration.result != 'success' || needs.build.result != 'success' || needs.browser-accessibility.result != 'success' }}
        run: exit 1
