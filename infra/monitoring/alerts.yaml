version: 1
owner: loresafe-operations
alerts:
  - name: api-high-error-rate
    severity: page
    expression: rate(loresafe_http_requests_total{status=~"5.."}[5m]) / rate(loresafe_http_requests_total[5m]) > 0.05
    for: 10m
  - name: api-high-latency
    severity: ticket
    expression: sum(rate(loresafe_http_request_duration_ms_sum[10m])) / sum(rate(loresafe_http_request_duration_ms_count[10m])) > 1000
    for: 15m
  - name: api-liveness-failing
    severity: page
    expression: synthetic_liveness_success == 0
    for: 5m
  - name: storage-cleanup-failures
    severity: ticket
    expression: increase(loresafe_storage_cleanup_failed_total[30m]) > 0
    for: 5m
